    joint: rev_3
    pid: {p: 100.0, i: 0.01, d: 10.0}
  rev_4_position_controller:
    type: effort_controllers/JointPositionController
    joint: rev_4
    pid: {p: 100.0, i: 0.01, d: 10.0}
  Corredera 7_position_controller:
    type: effort_controllers/JointPositionController
    joint: Corredera 7
    pid: {p: 100.0, i: 0.01, d: 10.0}
  Corredera 8_position_controller:
