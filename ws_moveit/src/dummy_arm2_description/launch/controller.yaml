    joint: rev_join2
    pid: {p: 100.0, i: 0.01, d: 10.0}
  rev_join3_position_controller:
    type: effort_controllers/JointPositionController
    joint: rev_join3
    pid: {p: 100.0, i: 0.01, d: 10.0}
  rev_join4_position_controller:
    type: effort_controllers/JointPositionController
